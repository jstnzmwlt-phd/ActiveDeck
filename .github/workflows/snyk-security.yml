name: Snyk Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Snyk Open Source Test (SCA)
        run: npx snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Code Test (SAST)
        run: |
          node -e "
            const { spawn } = require('child_process');
            const child = spawn('npx', ['snyk', 'code', 'test'], { shell: true });
            let output = '';
            child.stdout.on('data', data => output += data);
            child.stderr.on('data', data => output += data);
            child.on('close', (code) => {
              console.log(output);
              if (code !== 0) {
                const msg = output.replace(/\r/g, '').replace(/\n/g, '%0A').substring(0, 4000);
                console.log('::error title=Snyk Code Output::' + msg);
                process.exit(code);
              }
            });
          "
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
